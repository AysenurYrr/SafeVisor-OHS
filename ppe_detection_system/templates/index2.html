<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Canlı PPE Tespiti</title>
  <style>
    /* === Base === */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root{
      --bg:#0b0e12; --panel:#0f141a; --line:#1f2730; --text:#e7e7e7; --muted:#9fb0c3;
      --chip:#1f2730; --field:#1c2733; --brand:#1b6bff; --brand-h:#155ae0; --shadow:0 8px 24px rgba(0,0,0,.4);
      --drawer-w: 420px;
    }
    html,body{ height:100%; }
    body{ font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
    main{ display:flex; height:100vh; width:100vw; }

    /* === Left: Video Area === */
    .video-wrap{
      position:relative; flex:1; display:flex; align-items:center; justify-content:center; background:var(--bg);
    }
    #stream{ max-width:100%; max-height:100%; object-fit:contain; border-radius:12px; box-shadow:var(--shadow); }

    /* Logo (top-left over video) */
    .logo{
      position:absolute; top:16px; left:16px; z-index:10; display:flex; align-items:center; gap:10px;
      padding:6px 10px; border-radius:999px; background:rgba(12,16,22,.35); backdrop-filter: blur(6px);
    }
    .logo img{ height:100px; width:auto; display:block; }
    

    /* === Drawer (Right Panel) === */
    .drawer{
      width:var(--drawer-w); background:var(--panel); border-left:1px solid var(--line);
      display:flex; flex-direction:column; padding:24px; gap:16px;
      transition: transform .3s ease; transform: translateX(0);
    }
    .drawer.hidden{ transform: translateX(100%); }

    .drawer-content{ overflow-y:auto; flex:1; padding-right:4px; }
    .drawer-content::-webkit-scrollbar{ width:8px; }
    .drawer-content::-webkit-scrollbar-thumb{ background:#253140; border-radius:8px; }

    h3{ font-size:16px; margin-bottom:12px; color:#d0dce9; }
    label{ display:block; margin-bottom:8px; color:var(--muted); font-size:15px; }

    .checks{
      display:grid; grid-template-columns:1fr 1fr; gap:10px 12px; margin-bottom:16px;
    }
    .checks label{ display:flex; align-items:center; font-size:14px; gap:6px; }
    .checks input[type="checkbox"]{
      transform:scale(1.2); accent-color:var(--brand); cursor:pointer;
    }

    select, button, .lang-row select{
      width:100%; padding:10px; border-radius:10px; border:none; background:var(--field); color:var(--text); font-size:14px;
    }

    #saveBtn{
      background:var(--brand); color:#fff; font-weight:600; cursor:pointer; transition:background-color .2s ease;
    }
    #saveBtn:hover{ background:var(--brand-h); }

    .row{ display:flex; gap:8px; }
    .lang-row{ display:flex; gap:8px; align-items:center; }
    .badge{ font-size:12px; background:var(--chip); padding:6px 10px; border-radius:999px; color:var(--muted); }
    .hr{ height:1px; background:var(--line); margin:8px 0; }
    .notice{ font-size:12px; color:var(--muted); line-height:1.4; }

    /* === Drawer Toggle (Hamburger) === */
    .drawer-toggle{
      position:fixed; top:16px; right:16px; z-index:20;
      background:var(--field); border:none; border-radius:8px; padding:6px; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      box-shadow:0 4px 12px rgba(0,0,0,.25);width: auto;height: auto;transition: right 0.3s ease;
    }
    .drawer-toggle:focus-visible{ outline:2px solid #79a6ff; outline-offset:2px; }
    .drawer-toggle .bar{ width:30px; height:5px; background:var(--text); display:block; border-radius:2px; }
    .drawer-open .drawer-toggle {right: calc(var(--drawer-w) + 16px);}

    /* === Backdrop for small screens === */
    .backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:15; opacity:0; pointer-events:none; transition:opacity .2s ease;
    }
    .backdrop.show{ opacity:1; pointer-events:auto; }

    /* === Responsive behavior === */
    @media (max-width: 1024px){
      .drawer{ position:fixed; top:0; right:0; height:100vh; }
      main{ padding-right:0; }
    }
  </style>
</head>
<body>
  <main>
    <div class="video-wrap">
      <!-- Logo (change src to your logo file) -->
      <div class="logo" id="logoBox" aria-label="Uygulama Logosu">
        <img src="static/kara.png" alt="Logo" />
        
      </div>

      <!-- Live Stream -->
      <img id="stream" src="" alt="kamera akışı" width="640" height="480" />

      <!-- Drawer Toggle (Hamburger) -->
      <button
        class="drawer-toggle"
        id="drawerToggle"
        aria-label="Menüyü aç/kapat"
        aria-controls="drawer"
        aria-expanded="true"
        type="button"
        title="Menü"
      >
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
    </div>

    <!-- Right Drawer -->
    <div class="drawer" id="drawer" role="complementary" aria-label="Ayarlar">
      <div class="lang-row">
        <span class="badge" id="langLabel">Dil</span>
        <select id="langSelect" style="max-width:180px" aria-label="Dil seçimi">
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="drawer-content">
        <h3 id="ppeHeader">Detect Edilecek Malzemeler</h3>
        <div class="checks" id="ppeList"></div>

        <div class="hr"></div>

        <h3 id="workspaceHeader">Çalışma Alanı</h3>
        <select id="workspace" aria-label="Çalışma alanı"></select>

        <p class="notice" id="noticeText">
          * Kaydet’e bastığınızda seçimler yerel olarak saklanır ve sunucuya iletilir.
        </p>
      </div>

      <button id="saveBtn" type="button">Ayarları Kaydet</button>
      <button id="registerBtn" type="button">Çalışan Kaydı</button>

    </div>
  </main>

  <!-- Backdrop (for mobile overlay) -->
  <div class="backdrop" id="backdrop" aria-hidden="true"></div>

  <script>
    /* === WebSocket canlı akış === */
    const videoStream = document.getElementById("stream");
    const wsProtocol = (location.protocol === "https:") ? "wss://" : "ws://";
    const ws = new WebSocket(wsProtocol + (location.host || "localhost:8001") + "/ws");
    ws.binaryType = "arraybuffer";
    ws.onmessage = (event) => {
      const blob = new Blob([event.data], { type: "image/jpeg" });
      const url = URL.createObjectURL(blob);
      videoStream.src = url;
      if (videoStream.dataset.prevUrl) URL.revokeObjectURL(videoStream.dataset.prevUrl);
      videoStream.dataset.prevUrl = url;
    };

    /* === i18n (TR/EN) === */
    const langSelect = document.getElementById("langSelect");
    const ppeHeader = document.getElementById("ppeHeader");
    const workspaceHeader = document.getElementById("workspaceHeader");
    const saveBtn = document.getElementById("saveBtn");
    const noticeText = document.getElementById("noticeText");
    const langLabel = document.getElementById("langLabel");

    const I18N = {
      tr: {
        langLabel: "Dil",
        ppeHeader: "Detect Edilecek Malzemeler",
        workspaceHeader: "Çalışma Alanı",
        saveBtn: "Ayarları Kaydet",
        notice: "* Kaydet’e bastığınızda seçimler yerel olarak saklanır ve sunucuya iletilir.",
        workspaces: [
          { value: "inşaat", text: "İnşaat" },
          { value: "laboratuvar", text: "Laboratuvar" },
          { value: "tersane", text: "Tersane" },
          { value: "şantiye", text: "Şantiye" }
        ],
        PPE_DISPLAY: [
          "Gözlük", "Maske", "Yüz Koruyucu", "Kulak Koruyucu",
          "Eldiven", "Ayakkabı", "Güvenlik Yeleği", "İş Aletleri",
          "Baret", "Tıbbi Koruyucu Tulum", "İş Güvenliği Tulum"
        ],
        alerts: {
          saved: "Ayarlar kaydedildi.",
          error: "Hata oluştu.",
          conn: "Bağlantı hatası."
        }
      },
      en: {
        langLabel: "Language",
        ppeHeader: "Items to Detect",
        workspaceHeader: "Workspace",
        saveBtn: "Save Settings",
        notice: "* When you click Save, selections are stored locally and sent to the server.",
        workspaces: [
          { value: "construction", text: "Construction" },
          { value: "laboratory", text: "Laboratory" },
          { value: "shipyard", text: "Shipyard" },
          { value: "site", text: "Worksite" }
        ],
        PPE_DISPLAY: [
          "Glasses", "Face Mask", "Face Shield", "Earmuffs",
          "Gloves", "Shoes", "Safety Vest", "Tools",
          "Helmet", "Medical Protective Suit", "Safety Suit"
        ],
        alerts: {
          saved: "Settings saved.",
          error: "An error occurred.",
          conn: "Connection error."
        }
      }
    };

    // Backend label keys (server expects these English tags)
    const PPE_LABELS = {
      "Gözlük": "Glasses",
      "Maske": "Face-mask",
      "Yüz Koruyucu": "Face-guard",
      "Kulak Koruyucu": "Ear-mufs",
      "Eldiven": "Gloves",
      "Ayakkabı": "Shoes",
      "Güvenlik Yeleği": "Safety-vest",
      "İş Aletleri": "Tools",
      "Baret": "Helmet",
      "Tıbbi Koruyucu Tulum": "Medical-suit",
      "İş Güvenliği Tulum": "Safety-suit",
      "Glasses": "Glasses",
      "Face Mask": "Face-mask",
      "Face Shield": "Face-guard",
      "Earmuffs": "Ear-mufs",
      "Gloves": "Gloves",
      "Shoes": "Shoes",
      "Safety Vest": "Safety-vest",
      "Tools": "Tools",
      "Helmet": "Helmet",
      "Medical Protective Suit": "Medical-suit",
      "Safety Suit": "Safety-suit"
    };

    const ppeList = document.getElementById("ppeList");
    const workspace = document.getElementById("workspace");

    function getLang(){ return localStorage.getItem("lang") || "tr"; }
    function setLang(l){ localStorage.setItem("lang", l); }

    function renderTexts(){
      const L = I18N[getLang()];
      langLabel.textContent = L.langLabel;
      ppeHeader.textContent = L.ppeHeader;
      workspaceHeader.textContent = L.workspaceHeader;
      saveBtn.textContent = L.saveBtn;
      noticeText.textContent = L.notice;
    }

    function renderWorkspaces(selectedValue){
      const L = I18N[getLang()];
      workspace.innerHTML = "";
      L.workspaces.forEach(opt=>{
        const o = document.createElement("option");
        o.value = opt.value; o.textContent = opt.text;
        workspace.appendChild(o);
      });
      if(selectedValue){
        const exists = [...workspace.options].some(o=>o.value === selectedValue);
        workspace.value = exists ? selectedValue : L.workspaces[0]?.value;
      }
    }

    function renderPPECheckboxes(selectedItems = []){
      const L = I18N[getLang()];
      ppeList.innerHTML = "";
      L.PPE_DISPLAY.forEach(displayName=>{
        const labelEl = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        const backendValue = PPE_LABELS[displayName] || displayName;
        checkbox.value = backendValue;
        checkbox.checked = selectedItems.includes(backendValue);
        labelEl.appendChild(checkbox);
        labelEl.append(" " + displayName);
        ppeList.appendChild(labelEl);
      });
    }

    // === Drawer open/close with persistence & backdrop ===
    const drawer = document.getElementById("drawer");
    const drawerToggle = document.getElementById("drawerToggle");
    const backdrop = document.getElementById("backdrop");

    function isMobile(){ return window.matchMedia("(max-width: 1024px)").matches; }
    function setDrawer(open){
      drawer.classList.toggle("hidden", !open);
      drawerToggle.setAttribute("aria-expanded", String(open));
      localStorage.setItem("drawerOpen", String(open));
      // Backdrop for small screens only
      if(isMobile() && open){ backdrop.classList.add("show"); }
      else{ backdrop.classList.remove("show"); }
    }

    drawerToggle.addEventListener("click", ()=> setDrawer(drawer.classList.contains("hidden")));
    backdrop.addEventListener("click", ()=> setDrawer(false));
    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape" && !drawer.classList.contains("hidden")){
        setDrawer(false);
      }
    });
    window.addEventListener("resize", ()=>{
      // On resize, keep current state but hide backdrop if becoming desktop
      if(!isMobile()){ backdrop.classList.remove("show"); }
    });

    // === Initial load ===
    window.addEventListener("DOMContentLoaded", async ()=>{
      // Language
      langSelect.value = getLang();
      renderTexts();

      // Drawer initial state: desktop -> open, mobile -> from storage or closed
      const stored = localStorage.getItem("drawerOpen");
      let initialOpen;
      if(stored === null){
        initialOpen = !isMobile(); // default: desktop open, mobile closed
      } else {
        initialOpen = stored === "true";
      }
      setDrawer(initialOpen);

      // Workspaces
      renderWorkspaces();

      // Load config from server
      try{
        const cfg = await (await fetch("/config")).json();
        renderWorkspaces(cfg.workspace || I18N[getLang()].workspaces?.[0]?.value);
        workspace.value = cfg.workspace || workspace.value;
        renderPPECheckboxes(cfg.required_items || []);
      }catch(e){
        renderPPECheckboxes([]);
      }
    });

    // Language change
    langSelect.addEventListener("change", ()=>{
      setLang(langSelect.value);
      const currentWorkspace = workspace.value;
      renderTexts();
      renderWorkspaces(currentWorkspace);
      const selectedItems = [...ppeList.querySelectorAll("input:checked")].map(el=>el.value);
      renderPPECheckboxes(selectedItems);
    });

    // Save settings
    document.getElementById("saveBtn").addEventListener("click", async ()=>{
      const selectedItems = [...ppeList.querySelectorAll("input:checked")].map(el=>el.value);
      const body = {
        required_items: selectedItems,
        workspace: workspace.value,
        ui_lang: getLang()
      };
      const L = I18N[getLang()];
      try{
        const res = await fetch("/config", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(body)
        });
        if(res.ok){
          alert(L.alerts.saved);
          localStorage.setItem("required_items", JSON.stringify(selectedItems));
          localStorage.setItem("workspace", workspace.value);
        }else{
          alert(L.alerts.error);
        }
      }catch(e){
        alert(L.alerts.conn);
      }
    });

    // Çalışan kayıt sayfasına git
    document.getElementById("registerBtn").addEventListener("click", ()=>{
      window.location.href = "/register";
    });

  </script>
</body>
</html>
